cubes:
  - name: FactPosAilSales
    sql_table: "fact_pos_ail_sales"
    title: "POS / AIL Sales"
    description: >
      Invoice line-item level POS and AIL sales fact table.
      Sourced from Dataverse_Prod (V_FNO_AIL_POS_SALES_TC_ONLINE) joined
      with SAP Item Master for product hierarchy.
      Covers current month (or last month on the 1st of the month).

    # ─────────────────────────────────────────────────────────────
    # DIMENSIONS
    # ─────────────────────────────────────────────────────────────
    dimensions:

      # ── Primary key (invoice + line sequence) ─────────────────
      - name: invoice_line_key
        sql: "CONCAT({TABLE}.INVOICENO, '-', {TABLE}.RTRANS_LINEITM_SEQ)"
        type: string
        primary_key: true
        shown: false

      # ── Invoice identity ───────────────────────────────────────
      - name: invoiceno
        sql: INVOICENO
        type: string
        title: "Invoice No"

      - name: ail_order_id
        sql: AIL_ORDER_ID
        type: string
        title: "AIL Order ID"

      - name: rtrans_lineitm_seq
        sql: RTRANS_LINEITM_SEQ
        type: string
        title: "Line Sequence"

      - name: invoicetype
        sql: INVOICETYPE
        type: string
        title: "Invoice Type"

      # ── Date ──────────────────────────────────────────────────
      - name: invoice_date
        sql: INVOICE_DATE
        type: time
        title: "Invoice Date"

      - name: day
        sql: DAY
        type: string
        title: "Day of Week"

      # ── Store / Location ───────────────────────────────────────
      - name: company
        sql: COMPANY
        type: string
        title: "Company"

      - name: region
        sql: REGION
        type: string
        title: "Region"

      - name: state
        sql: STATE
        type: string
        title: "State"

      - name: ail_order_state
        sql: AIL_ORDER_STATE
        type: string
        title: "AIL Order State"

      - name: channel
        sql: CHANNEL
        type: string
        title: "Channel"

      - name: store_type
        sql: STORE_TYPE
        type: string
        title: "Store Type"

      - name: ownership_type
        sql: OWNERSHIP_TYPE
        type: string
        title: "Ownership Type"

      - name: sap_storecode
        sql: SAP_STORECODE
        type: string
        title: "SAP Store Code"

      - name: xstore_storecode
        sql: XSTORE_STORECODE
        type: string
        title: "Xstore Store Code"

      - name: name
        sql: NAME
        type: string
        title: "Store Name"

      # ── Product ────────────────────────────────────────────────
      - name: brand
        sql: BRAND
        type: string
        title: "Brand"

      - name: subbrand
        sql: SUBBRAND
        type: string
        title: "Sub-Brand"

      - name: class
        sql: CLASS
        type: string
        title: "Class"

      - name: subclass
        sql: SUBCLASS
        type: string
        title: "Sub-Class"

      - name: supplierstyle
        sql: SUPPLIERSTYLE
        type: string
        title: "Supplier Style"

      - name: stylecode
        sql: STYLECODE
        type: string
        title: "Style Code"

      - name: item_id
        sql: ITEM_ID
        type: string
        title: "Item ID"

      - name: item_description
        sql: ITEM_DESCRIPTION
        type: string
        title: "Item Description"

      - name: barcode
        sql: BARCODE
        type: string
        title: "Barcode"

      - name: itemsize
        sql: ITEMSIZE
        type: string
        title: "Size"

      - name: color
        sql: COLOR
        type: string
        title: "Color"

      - name: gender
        sql: GENDER
        type: string
        title: "Gender"

      - name: sleeve
        sql: SLEEVE
        type: string
        title: "Sleeve"

      - name: basiccore
        sql: BASICCORE
        type: string
        title: "Basic / Core"

      - name: quality
        sql: QUALITY
        type: string
        title: "Quality"

      - name: material_type
        sql: MATERIAL_TYPE
        type: string
        title: "Material Type"

      - name: season
        sql: SEASON
        type: string
        title: "Season"

      - name: hsn_code
        sql: HSN_CODE
        type: string
        title: "HSN Code"

      - name: rpc
        sql: RPC
        type: string
        title: "RPC"

      - name: qc_passed
        sql: QC_PASSED
        type: string
        title: "QC Passed"

      # ── Product hierarchy (from SAP Item Master) ───────────────
      - name: division
        sql: DIVISION
        type: string
        title: "Division"

      - name: category
        sql: CATEGORY
        type: string
        title: "Category"

      - name: fit_desc
        sql: FIT_DESC
        type: string
        title: "Fit Description"

      # ── GST / Tax identity ─────────────────────────────────────
      - name: gstno
        sql: GSTNO
        type: string
        title: "GST No"

      # ── Discount / Scheme ──────────────────────────────────────
      - name: manual_disc_reason
        sql: MANUAL_DISC_REASON
        type: string
        title: "Manual Discount Reason"

      - name: scheme_code
        sql: SCHEME_CODE
        type: string
        title: "Scheme Code"

      - name: scheme_description
        sql: SCHEME_DESCRIPTION
        type: string
        title: "Scheme Description"

      # ── Order / Fulfilment ─────────────────────────────────────
      - name: external_system
        sql: EXTERNAL_SYSTEM
        type: string
        title: "External System"

      - name: orders
        sql: ORDERS
        type: string
        title: "Orders"

      - name: issalesordercreated
        sql: ISSALESORDERCREATED
        type: string
        title: "Sales Order Created"

      - name: omuniitemid
        sql: OMUNIITEMID
        type: string
        title: "OmniChannel Item ID"

    # ─────────────────────────────────────────────────────────────
    # MEASURES
    # ─────────────────────────────────────────────────────────────
    measures:

      - name: count
        type: count
        title: "Invoice Lines"

      # ── Quantity ───────────────────────────────────────────────
      - name: quantity
        sql: QUANTITY
        type: sum
        title: "Quantity"

      # ── Pricing ────────────────────────────────────────────────
      - name: unitmrp
        sql: UNITMRP
        type: sum
        title: "Unit MRP"
        format: currency

      - name: total_mrp
        sql: TOTAL_MRP
        type: sum
        title: "Total MRP"
        format: currency

      - name: netamt
        sql: NETAMT
        type: sum
        title: "Net Amount"
        format: currency

      # ── Discounts ──────────────────────────────────────────────
      - name: total_discount
        sql: TOTAL_DISCOUNT
        type: sum
        title: "Total Discount"
        format: currency

      - name: discount_excl
        sql: DISCOUNT_EXCL
        type: sum
        title: "Discount (excl. GST Rebate & GWP)"
        format: currency

      - name: gst_rebate
        sql: GST_REBATE
        type: sum
        title: "GST Rebate"
        format: currency

      - name: gwp_disc
        sql: GWP_DISC
        type: sum
        title: "GWP Discount"
        format: currency

      # ── Tax ────────────────────────────────────────────────────
      - name: taxable_amount
        sql: TAXABLE_AMOUNT
        type: sum
        title: "Taxable Amount"
        format: currency

      - name: taxrate
        sql: TAXRATE
        type: sum
        title: "Tax Rate (sum)"
        format: currency

      - name: sgst
        sql: SGST
        type: sum
        title: "SGST"
        format: currency

      - name: cgst
        sql: CGST
        type: sum
        title: "CGST"
        format: currency

      - name: igst
        sql: IGST
        type: sum
        title: "IGST"
        format: currency

      - name: cess
        sql: CESS
        type: sum
        title: "CESS"
        format: currency

      - name: taxamt
        sql: TAXAMT
        type: sum
        title: "Total Tax Amount"
        format: currency
