version: '2.2'

services:
  cube:
    image: cubejs/cube:latest   # stock image — DuckDB driver is built in
    ports:
      - "4000:4000"             # REST API + Playground UI
      - "15432:15432"           # Cube SQL API (PostgreSQL wire protocol)
    env_file: .env
    volumes:
      - .:/cube/conf            # mounts project root; data/fabric.duckdb lives here
    restart: unless-stopped
